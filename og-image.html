<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image - Chaotic Daily Oracle</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            background: #07040F;
            color: #F0D9A8;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 80px;
            box-sizing: border-box;
        }
        .title {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: 0.04em;
            color: #C8973A;
            margin: 0;
        }
        .subtitle {
            font-size: 32px;
            margin: 24px 0 0;
            color: #E8DFC8;
            max-width: 860px;
            line-height: 1.2;
        }
        .footer-tag {
            font-size: 24px;
            color: #B8B0C8;
            margin: 0;
        }
        .stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .stars circle {
            fill: #F0D9A8;
            opacity: 0.8;
        }
        .content {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <svg class="stars" viewBox="0 0 1200 630" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
